name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── JS/TS: lint + typecheck + test ────────────────────────
  js-ci:
    name: JS/TS CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

  # ── Python: lint + test ───────────────────────────────────
  python-ci:
    name: Python CI (Optimizer)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: '3.14'

      - name: Install dependencies
        working-directory: services/optimizer
        run: uv sync --extra dev

      - name: Lint (ruff)
        working-directory: services/optimizer
        run: uv run ruff check .

      - name: Test (pytest)
        working-directory: services/optimizer
        run: uv run pytest tests/ -v
